<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>한강의원 메신저</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef0f5;display:flex;align-items:flex-start;min-height:100vh;}
#wrap{width:360px;height:100vh;display:flex;flex-direction:column;background:#fff;box-shadow:2px 0 12px rgba(0,0,0,0.10);transition:width 0.25s;overflow:hidden;}
#wrap.collapsed{width:0;}
#toggle-btn{position:fixed;top:0;left:360px;width:22px;height:48px;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:0 8px 8px 0;box-shadow:2px 2px 6px rgba(0,0,0,0.15);z-index:999;transition:left 0.25s;}
#toggle-btn svg{fill:#fff;width:12px;height:12px;transition:transform 0.25s;}
#wrap.collapsed~#toggle-btn{left:0;}
#wrap.collapsed~#toggle-btn svg{transform:rotate(180deg);}
#titlebar{background:#534AB7;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
#titlebar .ttl{font-size:13px;font-weight:600;flex:1;}
#titlebar .sub{font-size:11px;opacity:0.75;}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;}
.login-title{font-size:15px;font-weight:700;color:#1a1a2e;}
.login-sub{font-size:11px;color:#888;text-align:center;}
.user-btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.user-btn{padding:6px 12px;border-radius:16px;border:1.5px solid #e0e0e0;background:#fff;color:#333;font-size:12px;cursor:pointer;font-weight:500;}
.user-btn.sel{background:#534AB7;color:#fff;border-color:#534AB7;}
.pw-input{width:100%;font-size:13px;padding:9px 12px;border-radius:8px;border:1.5px solid #e0e0e0;outline:none;}
.pw-input:focus{border-color:#534AB7;}
.err{font-size:11px;color:#e53e3e;height:16px;text-align:center;}
.login-btn{width:100%;padding:10px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
#app{flex:1;display:flex;overflow:hidden;}
.sidebar{width:110px;border-right:1px solid #eee;display:flex;flex-direction:column;background:#fafafa;flex-shrink:0;}
.sidebar-top{padding:10px 8px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:6px;}
.me-label{font-size:11px;font-weight:600;color:#534AB7;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{font-size:10px;color:#aaa;background:none;border:none;cursor:pointer;white-space:nowrap;}
.user-list{flex:1;overflow-y:auto;padding:4px 0;}
.uitem{display:flex;align-items:center;gap:6px;padding:7px 8px;cursor:pointer;border-left:2px solid transparent;position:relative;}
.uitem:hover{background:#f0efff;}
.uitem.active{background:#f0efff;border-left-color:#534AB7;}
.u-name{font-size:12px;font-weight:500;color:#1a1a2e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badge{background:#E53E3E;color:#fff;border-radius:8px;font-size:9px;padding:1px 5px;font-weight:700;}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.av-wrap{position:relative;flex-shrink:0;}
.online-dot{position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:#ccc;border:1.5px solid #fff;}
.online-dot.on{background:#1D9E75;}
.call-btn.start:disabled,.vcall-btn:disabled{opacity:0.35;cursor:not-allowed;}
.sm{width:22px;height:22px;font-size:9px;}
.c0{background:#EEEDFE;color:#3C3489;}.c1{background:#E1F5EE;color:#085041;}
.c2{background:#FAECE7;color:#712B13;}.c3{background:#E6F1FB;color:#0C447C;}
.c4{background:#FAEEDA;color:#633806;}
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-top{padding:9px 10px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.chat-top-name{font-size:13px;font-weight:600;color:#1a1a2e;flex:1;}
/* 통화 버튼 */
.call-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.call-btn.start{background:#1D9E75;}
.call-btn.end{background:#E53E3E;}
.call-btn svg{width:14px;height:14px;fill:#fff;}
/* 통화 상태 바 */
#call-bar{display:none;background:#1D9E75;color:#fff;font-size:11px;padding:5px 10px;text-align:center;flex-shrink:0;align-items:center;gap:8px;justify-content:center;}
#call-bar.show{display:flex;}
#call-bar.ringing{background:#f59e0b;}
/* 수신 알림 오버레이 */
#incoming{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;border-radius:16px;padding:14px 20px;z-index:9999;text-align:center;min-width:220px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
#incoming.show{display:block;}
#incoming .inc-name{font-size:14px;font-weight:600;margin-bottom:10px;}
#incoming .inc-btns{display:flex;gap:10px;justify-content:center;}
#incoming .inc-btns button{padding:8px 18px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
#incoming .accept{background:#1D9E75;color:#fff;}
#incoming .reject{background:#E53E3E;color:#fff;}
.msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
.mrow{display:flex;align-items:flex-end;gap:4px;}
.mrow.mine{flex-direction:row-reverse;}
.bubble{max-width:82%;padding:7px 10px;border-radius:14px;font-size:12px;line-height:1.5;word-break:break-word;}
.bubble.t{background:#f2f2f7;color:#1a1a2e;border-bottom-left-radius:3px;}
.bubble.m{background:#534AB7;color:#fff;border-bottom-right-radius:3px;}
.bubble.call-log{background:#f0f0f0;color:#666;font-size:11px;text-align:center;border-radius:8px;}
.mt{font-size:9px;color:#bbb;margin-bottom:2px;}
.msg-img{max-width:100%;max-height:160px;border-radius:10px;cursor:pointer;display:block;}
.msg-file{display:flex;align-items:center;gap:6px;padding:4px 0;}
.msg-file a{font-size:11px;color:inherit;text-decoration:underline;word-break:break-all;}
.upload-bar{height:3px;background:#534AB7;border-radius:2px;transition:width 0.2s;}
.input-row{display:flex;gap:6px;padding:8px;border-top:1px solid #eee;flex-shrink:0;align-items:center;}
.input-row input[type=text]{flex:1;font-size:12px;padding:7px 11px;border-radius:18px;border:1.5px solid #e0e0e0;outline:none;background:#fafafa;}
.input-row input[type=text]:focus{border-color:#534AB7;background:#fff;}
.sbtn{width:30px;height:30px;border-radius:50%;background:#534AB7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fbtn{width:30px;height:30px;border-radius:50%;background:#f0efff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;gap:6px;font-size:12px;}
.dsep{text-align:center;font-size:10px;color:#bbb;padding:3px 0;}
#imgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9998;align-items:center;justify-content:center;cursor:pointer;}
#imgModal img{max-width:95vw;max-height:95vh;border-radius:8px;}
#imgModal.show{display:flex;}
/* ── 영상통화 전체화면 ── */
#videoOverlay{display:none;position:fixed;inset:0;background:#000;z-index:10000;flex-direction:column;align-items:center;justify-content:center;}
#videoOverlay.show{display:flex;}
#remoteVideo{width:100%;height:100%;object-fit:cover;background:#111;}
#localVideo{position:absolute;bottom:20px;right:16px;width:100px;height:140px;object-fit:cover;border-radius:10px;border:2px solid #fff;background:#222;z-index:10001;}
.video-bar{position:absolute;top:0;left:0;right:0;padding:14px 16px;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:10002;}
.video-controls{position:absolute;bottom:0;left:0;right:0;padding:20px 16px 32px;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);display:flex;justify-content:center;gap:20px;z-index:10002;}
.vc-btn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;}
.vc-btn.end{background:#E53E3E;}
.vc-btn.mute{background:rgba(255,255,255,0.2);}
.vc-btn.mute.active{background:rgba(255,255,255,0.5);}
.vc-btn.cam{background:rgba(255,255,255,0.2);}
.vc-btn.cam.active{background:rgba(255,255,255,0.5);}
.video-status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:14px;font-weight:600;text-align:center;z-index:10002;pointer-events:none;}
/* 영상통화 버튼 */
.vcall-btn{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#7c3aed;}
.vcall-btn svg{width:14px;height:14px;fill:#fff;}
/* 관리자 모달 */
#adminModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9997;align-items:center;justify-content:center;}
#adminModal.show{display:flex;}
.admin-card{background:#fff;border-radius:14px;padding:22px 20px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.admin-card h3{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:16px;text-align:center;}
.admin-row{margin-bottom:14px;}
.admin-row label{font-size:11px;color:#666;font-weight:600;display:block;margin-bottom:4px;}
.admin-row input{width:100%;font-size:12px;padding:7px 10px;border-radius:7px;border:1.5px solid #e0e0e0;outline:none;}
.admin-row input:focus{border-color:#534AB7;}
.admin-section{background:#f7f7fb;border-radius:9px;padding:12px;margin-bottom:12px;}
.admin-section-title{font-size:11px;font-weight:700;color:#534AB7;margin-bottom:10px;}
.admin-btns{display:flex;gap:8px;margin-top:4px;}
.admin-save{flex:1;padding:9px;background:#534AB7;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}
.admin-cancel{padding:9px 14px;background:#f0f0f0;color:#555;border:none;border-radius:7px;font-size:12px;cursor:pointer;}
.admin-msg{font-size:11px;color:#1D9E75;text-align:center;height:16px;margin-top:6px;}
.admin-btn-top{font-size:10px;background:#f0efff;color:#534AB7;border:none;border-radius:6px;padding:3px 8px;cursor:pointer;font-weight:600;}
/* 탭 */
.admin-tabs{display:flex;border-bottom:1.5px solid #eee;margin-bottom:14px;}
.admin-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;color:#aaa;border-bottom:2px solid transparent;margin-bottom:-1.5px;}
.admin-tab.on{color:#534AB7;border-bottom-color:#534AB7;}
.admin-pane{display:none;}.admin-pane.on{display:block;}
/* 통화기록 */
.clog-list{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.clog-item{background:#f7f7fb;border-radius:9px;padding:11px 12px;font-size:11px;}
.clog-head{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.clog-type{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;background:#534AB7;color:#fff;}
.clog-type.video{background:#7c3aed;}
.clog-name{font-weight:700;color:#1a1a2e;flex:1;}
.clog-date{font-size:10px;color:#aaa;}
.clog-time{color:#534AB7;font-weight:600;}
.clog-memo{margin-top:5px;color:#444;background:#fff;border-radius:6px;padding:5px 8px;font-size:11px;line-height:1.4;}
.clog-empty{text-align:center;color:#bbb;padding:30px 0;font-size:12px;}
/* 진료 메모 모달 */
#memoModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10100;align-items:center;justify-content:center;}
#memoModal.show{display:flex;}
.memo-card{background:#fff;border-radius:14px;padding:22px 20px;width:290px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.memo-card h3{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:4px;}
.memo-card .memo-sub{font-size:11px;color:#888;margin-bottom:12px;}
.memo-card textarea{width:100%;height:90px;font-size:12px;padding:8px 10px;border-radius:8px;border:1.5px solid #e0e0e0;outline:none;resize:none;line-height:1.5;}
.memo-card textarea:focus{border-color:#534AB7;}
.memo-btns{display:flex;gap:8px;margin-top:10px;}
.memo-save{flex:1;padding:9px;background:#534AB7;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}
.memo-skip{padding:9px 14px;background:#f0f0f0;color:#555;border:none;border-radius:7px;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<div id="wrap">
  <div id="titlebar">
    <span style="font-size:16px;">💬</span>
    <span class="ttl">한강의원</span>
    <span class="sub" id="me-badge"></span>
    <button id="admin-top-btn" class="admin-btn-top" onclick="openAdmin()" style="display:none;">⚙️ 관리</button>
  </div>
  <div id="main-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>
</div>
<button id="toggle-btn" onclick="toggleWrap()" title="접기/펼치기">
  <svg viewBox="0 0 10 16"><path d="M8 2L2 8l6 6"/></svg>
</button>
<div id="imgModal" onclick="closeModal()"><img id="modalImg" src="" alt=""/></div>
<!-- 수신 알림 -->
<div id="incoming">
  <div class="inc-name" id="inc-name">📞 통화 수신</div>
  <div class="inc-btns">
    <button class="accept" onclick="acceptCall()">받기</button>
    <button class="reject" onclick="rejectCall()">거절</button>
  </div>
</div>
<!-- 관리자 모달 -->
<div id="adminModal">
  <div class="admin-card" style="width:320px;max-height:90vh;overflow-y:auto;">
    <div class="admin-tabs">
      <button class="admin-tab on" onclick="switchAdminTab('accounts')">⚙️ 계정</button>
      <button class="admin-tab" onclick="switchAdminTab('logs')">📋 통화기록</button>
    </div>
    <!-- 계정 관리 탭 -->
    <div class="admin-pane on" id="adm-pane-accounts">
      <div class="admin-section">
        <div class="admin-section-title">원장 계정 (비번만 변경)</div>
        <div class="admin-row"><label>비밀번호</label><input id="adm-pw-wonjang" type="text" placeholder="새 비밀번호"/></div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">접수1 계정</div>
        <div class="admin-row"><label>표시 이름</label><input id="adm-label1" type="text" placeholder="예: 접수1"/></div>
        <div class="admin-row"><label>비밀번호</label><input id="adm-pw1" type="text" placeholder="새 비밀번호"/></div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">접수2 계정</div>
        <div class="admin-row"><label>표시 이름</label><input id="adm-label2" type="text" placeholder="예: 접수2"/></div>
        <div class="admin-row"><label>비밀번호</label><input id="adm-pw2" type="text" placeholder="새 비밀번호"/></div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">guest1 계정</div>
        <div class="admin-row"><label>표시 이름</label><input id="adm-label-g1" type="text" placeholder="예: guest1"/></div>
        <div class="admin-row"><label>비밀번호</label><input id="adm-pw-g1" type="text" placeholder="새 비밀번호"/></div>
      </div>
      <div class="admin-section">
        <div class="admin-section-title">guest2 계정</div>
        <div class="admin-row"><label>표시 이름</label><input id="adm-label-g2" type="text" placeholder="예: guest2"/></div>
        <div class="admin-row"><label>비밀번호</label><input id="adm-pw-g2" type="text" placeholder="새 비밀번호"/></div>
      </div>
      <div class="admin-msg" id="adm-msg"></div>
      <div class="admin-btns">
        <button class="admin-cancel" onclick="closeAdmin()">취소</button>
        <button class="admin-save" onclick="saveAdmin()">저장</button>
      </div>
    </div>
    <!-- 통화기록 탭 -->
    <div class="admin-pane" id="adm-pane-logs">
      <div id="clog-list" class="clog-list"><div class="clog-empty">불러오는 중...</div></div>
      <div class="admin-btns" style="margin-top:12px;">
        <button class="admin-cancel" onclick="closeAdmin()">닫기</button>
      </div>
    </div>
  </div>
</div>
<!-- 진료 메모 모달 -->
<div id="memoModal">
  <div class="memo-card">
    <h3>📝 진료 메모</h3>
    <div class="memo-sub" id="memo-sub">통화 후 메모를 남겨주세요 (선택)</div>
    <textarea id="memo-text" placeholder="진료 내용, 특이사항 등..."></textarea>
    <div class="memo-btns">
      <button class="memo-skip" onclick="saveMemo(false)">건너뛰기</button>
      <button class="memo-save" onclick="saveMemo(true)">저장</button>
    </div>
  </div>
</div>
<!-- 숨겨진 오디오 -->
<audio id="remoteAudio" autoplay playsinline></audio>
<!-- 영상통화 전체화면 오버레이 -->
<div id="videoOverlay">
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay playsinline muted></video>
  <div class="video-bar">
    <span>📹</span>
    <span id="video-peer-name">영상통화</span>
    <span id="video-timer" style="font-size:11px;opacity:0.8;margin-left:auto;"></span>
  </div>
  <div class="video-status" id="video-status"></div>
  <div class="video-controls">
    <button class="vc-btn mute" id="vc-mute" onclick="toggleVMute()" title="음소거">🎤</button>
    <button class="vc-btn end" onclick="hangUpVideo(true)" title="통화 종료">📵</button>
    <button class="vc-btn cam" id="vc-cam" onclick="toggleVCam()" title="카메라 끄기">📷</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
firebase.initializeApp({
  databaseURL:"https://notice-ped-default-rtdb.firebaseio.com/",
  storageBucket:"temp-share-image-hanriver.firebasestorage.app"
});
const db=firebase.database();
const storage=firebase.storage();

const DEFAULT_ACCOUNTS=[
  {id:'wonjang',label:'원장',   pw:'han1234',    c:'c0'},
  {id:'jesu1',  label:'접수1',  pw:'js10000',    c:'c2'},
  {id:'jesu2',  label:'접수2',  pw:'js20000',    c:'c3'},
  {id:'guest1', label:'guest1', pw:'guest1',     c:'c1'},
  {id:'guest2', label:'guest2', pw:'guest2',     c:'c4'},
];
let ACCOUNTS=[...DEFAULT_ACCOUNTS];

// Firebase에서 계정 정보 로드 (동적 변경 가능)
async function loadAccountsFromDB(){
  try{
    const snap=await db.ref('admin/accounts').once('value');
    const d=snap.val();
    if(d){
      ACCOUNTS=DEFAULT_ACCOUNTS.map(a=>{
        if(a.id==='wonjang'&&d.wonjang) return {...a, label:d.wonjang.label||a.label, pw:d.wonjang.pw||a.pw};
        if(a.id==='jesu1'&&d.jesu1) return {...a, label:d.jesu1.label||a.label, pw:d.jesu1.pw||a.pw};
        if(a.id==='jesu2'&&d.jesu2) return {...a, label:d.jesu2.label||a.label, pw:d.jesu2.pw||a.pw};
        if(a.id==='guest1'&&d.guest1) return {...a, label:d.guest1.label||a.label, pw:d.guest1.pw||a.pw};
        if(a.id==='guest2'&&d.guest2) return {...a, label:d.guest2.label||a.label, pw:d.guest2.pw||a.pw};
        return a;
      });
    }

let callListenerRef=null; // 수신 감지 ref
let callState='idle'; // idle | calling | ringing | incall

let callId=null;      // 현재 통화 id
let isVideo=false;    // 현재 통화가 영상통화인지

/* ════════════════════════════
   WebRTC 통화
════════════════════════════ */
function callKey(){return ckey(me,callPeer);}

async function startCall(withVideo=false){
  if(callState!=='idle'||!peer){return;}
  callPeer=peer;
  callState='calling';
  isVideo=withVideo;
  updateCallBar((withVideo?'📹':'📞')+' 연결 중...','ringing');

  // 미디어 획득 (카메라 없으면 음성만)
  let constraints={audio:true, video:withVideo};
  try{ localStream=await navigator.mediaDevices.getUserMedia(constraints); }
  catch(e){
    if(withVideo){
      try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false}); isVideo=false; }
      catch(e2){ alert('마이크 접근 실패: '+e2.message); callState='idle'; updateCallBar(); return; }
    } else {
      alert('마이크 접근 실패: '+e.message); callState='idle'; updateCallBar(); return;
    }
  }

  if(isVideo && localStream.getVideoTracks().length>0){
    const lv=document.getElementById('localVideo');
    if(lv) lv.srcObject=localStream;
  }

  pc=new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  // 원격 스트림 연결
  pc.ontrack=e=>{
    if(isVideo){
      const rv=document.getElementById('remoteVideo');
      if(rv) rv.srcObject=e.streams[0];
    } else {
      const audio=document.getElementById('remoteAudio');
      if(audio) audio.srcObject=e.streams[0];
    }
  };

  // ICE 후보 Firebase 전송
  callId='call_'+Date.now();
  const ckRef=db.ref('calls/'+callKey());
  pc.onicecandidate=e=>{
    if(e.candidate) ckRef.child('callerCandidates').push(e.candidate.toJSON());
  };

  // Offer 생성
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Firebase에 통화 요청 기록
  await ckRef.set({
    callId, caller:me, callee:callPeer,
    offer:{type:offer.type, sdp:offer.sdp},
    status:'calling', isVideo:isVideo, ts:Date.now()
  });
  callRef=ckRef;

  // 상대방 응답 대기
  callRef.on('value',async snap=>{
    const d=snap.val();
    if(!d) return;
    if(d.status==='answered' && d.answer && pc.signalingState==='have-local-offer'){
      await pc.setRemoteDescription(new RTCSessionDescription(d.answer));
      callRef.child('calleeCandidates').on('child_added',cs=>{
        pc.addIceCandidate(new RTCIceCandidate(cs.val())).catch(()=>{});
      });
      callState='incall';
      if(isVideo){
        showVideoOverlay(callPeer);
      } else {
        updateCallBar('📞 통화 중 ('+acct(callPeer)?.label+')', 'show');
      }
    }
    if(d.status==='rejected'||d.status==='ended'){
      if(isVideo) hangUpVideo(false); else hangUp(false);
    }
  });
}

// 수신 감지 시작
function startCallListener(){
  if(callListenerRef) callListenerRef.off();
  // 나를 callee로 하는 통화 감지 (비관리자는 원장에서 오는 것만)
  const others=isAdmin(me)
    ? ACCOUNTS.filter(a=>a.id!==me)
    : [ACCOUNTS.find(a=>a.id==='wonjang')].filter(Boolean);
  others.forEach(u=>{
    const ck=db.ref('calls/'+ckey(me,u.id));
    ck.on('value',snap=>{
      const d=snap.val();
      if(!d||d.status!=='calling'||d.callee!==me) return;
      if(callState!=='idle') return; // 이미 통화 중
      // 30초 이상 된 요청 무시
      if(Date.now()-d.ts>30000) return;
      callPeer=u.id;
      callId=d.callId;
      callRef=ck;
      callState='ringing';
      showIncoming(u.id, !!(d.isVideo));
    });
  });
}

  document.getElementById('inc-name').textContent=(vid?'📹':'📞')+' '+acct(uid)?.label+'님이 '+(vid?'영상':'전화')+'중...';
  el.classList.add('show');

function hideIncoming(){
  document.getElementById('incoming').classList.remove('show');

async function acceptCall(){
  hideIncoming();
  if(callState!=='ringing'||!callRef) return;
  callState='incall';

  // 영상통화인지 확인
  const snap0=await callRef.once('value');
  const d0=snap0.val();
  isVideo=!!(d0&&d0.isVideo);

  let constraints={audio:true, video:isVideo};
  try{ localStream=await navigator.mediaDevices.getUserMedia(constraints); }
  catch(e){
    if(isVideo){
      try{ localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false}); isVideo=false; }
      catch(e2){ alert('마이크 접근 실패: '+e2.message); rejectCall(); return; }
    } else {
      alert('마이크 접근 실패: '+e.message); rejectCall(); return;
    }
  }

  if(isVideo && localStream.getVideoTracks().length>0){
    const lv=document.getElementById('localVideo');
    if(lv) lv.srcObject=localStream;
  }

  pc=new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  pc.ontrack=e=>{
    if(isVideo){
      const rv=document.getElementById('remoteVideo');
      if(rv) rv.srcObject=e.streams[0];
    } else {
      const audio=document.getElementById('remoteAudio');
      if(audio) audio.srcObject=e.streams[0];
    }
  };
  pc.onicecandidate=e=>{
    if(e.candidate) callRef.child('calleeCandidates').push(e.candidate.toJSON());
  };

  await pc.setRemoteDescription(new RTCSessionDescription(d0.offer));
  callRef.child('callerCandidates').on('child_added',cs=>{
    pc.addIceCandidate(new RTCIceCandidate(cs.val())).catch(()=>{});
  });

  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await callRef.update({answer:{type:answer.type,sdp:answer.sdp},status:'answered'});

  if(isVideo){
    showVideoOverlay(callPeer);
  } else {
    updateCallBar('📞 통화 중 ('+acct(callPeer)?.label+')','show');
  }
}

function rejectCall(){
  hideIncoming();
  if(callRef) callRef.update({status:'rejected'});
  cleanupCall();
}

function hangUp(writeDB=true){
  hideIncoming();
  if(writeDB && callRef) callRef.update({status:'ended'});
  if(callPeer && callState==='incall'){
    const k=mkey(me,callPeer);
    const dur=callStartTs?Math.floor((Date.now()-callStartTs)/1000):0;
    const endTs=Date.now();
    db.ref('msgs/'+k).push({from:me,type:'calllog',text:'📞 통화 종료 ('+fmtDur(dur)+')',ts:endTs});
    // 통화기록 Firebase 저장
    const logRef=db.ref('calllogs').push({
      caller:me, callee:callPeer,
      callerLabel:acct(me)?.label||me, calleeLabel:acct(callPeer)?.label||callPeer,
      type:'voice', startTs:callStartTs||endTs, endTs, duration:dur, memo:'', ts:endTs
    });
    pendingLogId=logRef.key;
    cleanupCall();
    if(isAdmin(me)) showMemoModal(callPeer, dur, false);
  } else {
    cleanupCall();
  }
}

function cleanupCall(){
  if(pc){pc.close();pc=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  const audio=document.getElementById('remoteAudio');
  if(audio) audio.srcObject=null;
  const rv=document.getElementById('remoteVideo');
  if(rv) rv.srcObject=null;
  const lv=document.getElementById('localVideo');
  if(lv) lv.srcObject=null;
  if(callRef){callRef.off();callRef=null;}
  if(videoTimer){clearInterval(videoTimer);videoTimer=null;}
  videoSeconds=0; vMuted=false; vCamOff=false; isVideo=false;
  callStartTs=0;
  callState='idle'; callPeer=null; callId=null;
  updateCallBar();
}


// 시간 포맷
function fmtDur(sec){
  if(!sec) return '0초';
  const m=Math.floor(sec/60), s=sec%60;
  return m>0 ? m+'분 '+s+'초' : s+'초';
}
function fmtTs(ts){
  return new Date(ts).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function loadCallLogs(){
  const el=document.getElementById('clog-list');
  el.innerHTML='<div class="clog-empty">불러오는 중...</div>';
  db.ref('calllogs').orderByChild('ts').limitToLast(50).once('value',snap=>{
    const logs=[];
    snap.forEach(ch=>logs.unshift({id:ch.key,...ch.val()}));
    if(!logs.length){el.innerHTML='<div class="clog-empty">통화 기록이 없습니다.</div>';return;}
    el.innerHTML=logs.map(l=>{
      const isVid=l.type==='video';
      const other=(l.caller==='wonjang')?l.calleeLabel:l.callerLabel;
      return `<div class="clog-item">
        <div class="clog-head">
          <span class="clog-type${isVid?' video':''}">${isVid?'영상':'음성'}</span>
          <span class="clog-name">${other}</span>
          <span class="clog-date">${fmtTs(l.startTs)}</span>
        </div>
        <div class="clog-time">⏱ ${fmtDur(l.duration)}</div>
        ${l.memo?`<div class="clog-memo">📝 ${l.memo}</div>`:''}
      </div>`;
    }).join('');
  });
}

function hangUpVideo(writeDB=true){

    db.ref('msgs/'+k).push({from:me,type:'calllog',text:'📹 영상통화 종료 ('+fmtDur(dur)+')',ts:endTs});

function updateCallBar(text='',cls=''){
  const bar=document.getElementById('call-bar');
  if(!bar) return;
  // 통화 버튼 토글
  const btnStart=document.getElementById('btn-call-start');
  const btnVStart=document.getElementById('btn-vcall-start');
  const btnEnd=document.getElementById('btn-call-end');
  const active=!!text;
  if(btnStart)  btnStart.style.display=active?'none':'flex';
  if(btnVStart) btnVStart.style.display=active?'none':'flex';
  if(btnEnd)    btnEnd.style.display=active?'flex':'none';
  if(!text){bar.classList.remove('show','ringing');return;}
  bar.textContent=text;
  bar.className='';
  bar.classList.add(cls==='ringing'?'ringing':'show');
  if(cls==='show' && !isVideo && !callStartTs) callStartTs=Date.now();
}

/* ════════════════════════════
   로그인
════════════════════════════ */
function showLogin(err){
  stopChat();stopBadge();setMeBadge('');
  document.getElementById('main-content').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    <div style="font-size:28px;">💬</div>
    <div class="login-title">메신저 로그인</div>
    <div class="login-sub">소속을 선택하고<br>비밀번호를 입력하세요</div>
    <div class="user-btns">
      ${ACCOUNTS.map(a=>`<button class="user-btn${selId===a.id?' sel':''}" onclick="pickUser('${a.id}')">${a.label}</button>`).join('')}
    </div>
    <input class="pw-input" id="pw" type="password" placeholder="비밀번호"
      autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="err">${err||''}</div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div></div>`;
  if(selId) setTimeout(()=>document.getElementById('pw')?.focus(),50);
}
function pickUser(id){
  selId=id;
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.toggle('sel',b.textContent===acct(id)?.label));
  // 관리자 계정은 비번 숨김, 비관리자는 보이도록
  const pwEl=document.getElementById('pw');
  if(pwEl){
    pwEl.type=isAdmin(id)?'password':'text';
    pwEl.value='';
    pwEl.focus();
  }
}
// GUEST_IDS는 위에서 이미 선언됨 (로그인마다 대화 초기화)

function doLogin(){
  if(!selId){showLogin('소속을 선택해주세요.');return;}
  const pw=document.getElementById('pw')?.value||'';
  const a=acct(selId);
  if(!a||pw!==a.pw){showLogin('비밀번호가 맞지 않습니다.');return;}
  me=selId;localStorage.setItem('hangang_me',me);
  unread={};peer=null;setMeBadge(a.label);
  registerPresence();
  // 게스트(접수1·접수2·guest1·guest2)는 로그인 시 원장과의 대화 내용 초기화
  if(GUEST_IDS.includes(me)){
    const chatKey='msgs/'+mkey(me,'wonjang');
    db.ref(chatKey).remove().then(()=>{
      // 읽음 기록도 초기화
      localStorage.removeItem(lrKey('wonjang'));
      initUnreadThenRender();
    }).catch(()=>initUnreadThenRender());
  } else {
    initUnreadThenRender();
  }
}
function doLogout(){
  hangUp();stopChat();stopBadge();stopPresenceListeners();
  if(me) db.ref('presence/'+me).remove();
  me=null;peer=null;unread={};onlineUsers={};
  localStorage.removeItem('hangang_me');showLogin();
}

function initUnreadThenRender(){
  const others=ACCOUNTS.filter(a=>a.id!==me);
  if(!others.length){sanitizePeer();renderApp();startBadgeListeners();startCallListener();startPresenceListener();return;}
  let done=0;
  others.forEach(u=>{
    const lr=getLR(u.id);
    db.ref('msgs/'+mkey(me,u.id)).once('value',snap=>{
      let c=0;
      snap.forEach(ch=>{const m=ch.val();if(m&&typeof m==='object'&&m.from===u.id&&m.ts>lr)c++;});
      unread[u.id]=c;done++;
      if(done===others.length){sanitizePeer();renderApp();startBadgeListeners();startCallListener();startPresenceListener();}
    });
  });
}

function startBadgeListeners(){
  stopBadge();
  const others=ACCOUNTS.filter(a=>a.id!==me);
  const startTs=Date.now();
  others.forEach(u=>{
    const ref=db.ref('msgs/'+mkey(me,u.id));
    const handler=ref.orderByChild('ts').startAt(startTs).on('child_added',snap=>{
      const m=snap.val();
      if(!m||typeof m!=='object') return;
      if(m.from===u.id&&peer!==u.id){unread[u.id]=(unread[u.id]||0)+1;updateBadgeEl(u.id);}
      if(m.from===u.id&&peer===u.id){unread[u.id]=0;updateBadgeEl(u.id);}
    });
    badgeListeners[u.id]={ref,handler};
  });
}
function updateBadgeEl(uid){
  const el=document.getElementById('bdg_'+uid);
  if(!el) return;
  const c=unread[uid]||0;
  el.innerHTML=c>0?`<span class="badge">${c}</span>`:'';
}

/* ════════════════════════════
   앱 화면
════════════════════════════ */
const ADMIN_IDS=['wonjang'];               // 원장만 전체 관리자
const STAFF_IDS=[];                        // 직원 관리자 없음
const GUEST_IDS=['jesu1','jesu2','guest1','guest2']; // 게스트 (원장과만 연결)
function isAdmin(id){return ADMIN_IDS.includes(id);}
function isStaff(id){return false;}
function canManage(id){return isAdmin(id);}

function renderApp(){
  const myA=acct(me);
  // 원장은 전체 목록, 나머지는 원장만 표시
  const others=isAdmin(me)
    ? ACCOUNTS.filter(a=>a.id!==me)
    : [ACCOUNTS.find(a=>a.id==='wonjang')].filter(Boolean);
  const sideHtml=others.map(u=>`
    <div class="uitem${peer===u.id?' active':''}" onclick="selectPeer('${u.id}')">
      <div class="av-wrap">
        <div class="av ${u.c}">${u.label.slice(0,2)}</div>
        <span class="online-dot${onlineUsers[u.id]?' on':''}" id="dot_${u.id}"></span>
      </div>
      <div class="u-name">${u.label}</div>
      <span id="bdg_${u.id}">${(unread[u.id]||0)>0?`<span class="badge">${unread[u.id]}</span>`:''}</span>
    </div>`).join('');

  const canCall=peer&&callState==='idle';
  const inCall=callState==='incall'||callState==='calling';

  const peerOnline=peer?onlineUsers[peer]:false;
  const chatHtml=peer?`
    <div class="chat-top">
      <div class="av-wrap">
        <div class="av ${acct(peer).c}">${acct(peer).label.slice(0,2)}</div>
        <span class="online-dot${peerOnline?' on':''}" id="dot_top_${peer}"></span>
      </div>
      <div class="chat-top-name">${acct(peer).label} <span style="font-size:10px;font-weight:400;color:${peerOnline?'#1D9E75':'#aaa'}">${peerOnline?'● 접속중':'● 오프라인'}</span></div>
      <button class="call-btn start" onclick="startCall(false)" title="${peerOnline?'음성통화':'오프라인 - 통화불가'}" id="btn-call-start" ${!peerOnline?'disabled':''} style="${inCall?'display:none':''}">
            <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
           </button>
      <button class="vcall-btn" onclick="startCall(true)" title="${peerOnline?'영상통화':'오프라인 - 통화불가'}" id="btn-vcall-start" ${!peerOnline?'disabled':''} style="${inCall?'display:none':''}">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
           </button>
      <button class="call-btn end" onclick="hangUp(true)" title="통화 종료" id="btn-call-end" style="${inCall?'':'display:none'}">
            <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
           </button>
    </div>
    <div id="call-bar"></div>
    <div class="msgs" id="msglist"></div>
    <div id="prog-wrap" style="padding:0 8px;display:none;"><div class="upload-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="input-row">
      <button class="fbtn" onclick="document.getElementById('fileInput').click()" title="파일 첨부">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt" onchange="uploadFile(this)"/>
      <input type="text" id="minput" placeholder="메시지 입력..." autocomplete="off"
        onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="sbtn" onclick="sendMsg()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22 11 13 2 9 22 2Z"/></svg>
      </button>
    </div>`
  :`<div class="empty">←<span>대화 상대 선택</span></div>`;

  document.getElementById('main-content').innerHTML=`
    <div id="app">
      <div class="sidebar">
        <div class="sidebar-top">
          <div class="av ${myA.c}">${myA.label.slice(0,2)}</div>
          <div class="me-label">${myA.label}</div>
          <button class="logout-btn" onclick="doLogout()">나가기</button>
        </div>
        <div class="user-list">${sideHtml}</div>
      </div>
      <div class="chat-area">${chatHtml}</div>
    </div>`;

  if(peer){startChatListener();setTimeout(()=>document.getElementById('minput')?.focus(),100);}
  if(inCall) updateCallBar(callState==='calling'?'📞 연결 중...':'📞 통화 중 ('+acct(callPeer)?.label+')', callState==='calling'?'ringing':'show');
}

function startChatListener(){
  stopChat();
  chatRef=db.ref('msgs/'+mkey(me,peer));
  chatRef.on('value',snap=>{
    const msgs=[];
    snap.forEach(ch=>{const m=ch.val();if(m&&typeof m==='object'&&m.from&&m.ts)msgs.push(m);});
    msgs.sort((a,b)=>a.ts-b.ts);
    renderMsgs(msgs);
    setLR(peer);unread[peer]=0;updateBadgeEl(peer);
  });
}

function renderMsgs(msgs){
  const list=document.getElementById('msglist');
  if(!list) return;
  const pA=acct(peer);
  let html='',lastD='';
  for(const m of msgs){
    const d=dstr(m.ts);
    if(d!==lastD){html+=`<div class="dsep">${d}</div>`;lastD=d;}
    const mine=m.from===me;
    let content='';
    if(m.type==='image') content=`<img class="msg-img" src="${esc(m.url)}" onclick="openModal('${esc(m.url)}')" alt="이미지"/>`;
    else if(m.type==='file') content=`<div class="msg-file">📎 <a href="${esc(m.url)}" target="_blank" rel="noopener">${esc(m.name)}</a></div>`;
    else if(m.type==='calllog') content=esc(m.text||'📞 통화');
    else content=esc(m.text||'');
    const isLog=m.type==='calllog';
    if(isLog){
      html+=`<div class="dsep">${content} · ${tstr(m.ts)}</div>`;
    } else {
      html+=`<div class="mrow${mine?' mine':''}">
        ${!mine?`<div class="av sm ${pA.c}">${pA.label.slice(0,2)}</div>`:''}
        <div>
          <div class="mt" style="text-align:${mine?'right':'left'}">${tstr(m.ts)}</div>
          <div class="bubble ${mine?'m':'t'}">${content}</div>
        </div>
      </div>`;
    }
  }
  if(!html) html=`<div class="empty">💬<span>${pA.label}과(와) 대화 시작</span></div>`;
  list.innerHTML=html;
  list.scrollTop=list.scrollHeight;
}

function selectPeer(uid){stopChat();peer=uid;unread[uid]=0;setLR(uid);renderApp();}
function sanitizePeer(){
  // 관리자 아닌 경우 원장과 자동 연결
  if(!isAdmin(me)){
    peer='wonjang';
  }
}

function sendMsg(){
  const inp=document.getElementById('minput');
  if(!inp||!peer) return;
  const text=inp.value.trim(); if(!text) return;
  inp.value='';
  db.ref('msgs/'+mkey(me,peer)).push({from:me,text,ts:Date.now()});
  inp.focus();
}

function uploadFile(input){
  const file=input.files[0]; if(!file||!peer) return;
  input.value='';
  const isImage=file.type.startsWith('image/');
  const path='messenger/'+mkey(me,peer)+'/'+Date.now()+'_'+file.name;
  const ref=storage.ref(path);
  const task=ref.put(file);
  const progWrap=document.getElementById('prog-wrap');
  const progBar=document.getElementById('prog-bar');
  if(progWrap) progWrap.style.display='block';
  task.on('state_changed',
    snap=>{const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);if(progBar)progBar.style.width=pct+'%';},
    err=>{if(progWrap)progWrap.style.display='none';alert('업로드 실패: '+err.message);},
    async()=>{
      const url=await task.snapshot.ref.getDownloadURL();
      if(progWrap)progWrap.style.display='none';
      if(progBar)progBar.style.width='0%';
      db.ref('msgs/'+mkey(me,peer)).push({from:me,ts:Date.now(),type:isImage?'image':'file',url,name:file.name});
    }
  );
}

/* ── 초기화 ── */
(async()=>{
  await loadAccountsFromDB();
  // 실시간으로 계정 변경 감지
  db.ref('admin/accounts').on('value',snap=>{
    const d=snap.val();
    if(!d) return;
    ACCOUNTS=DEFAULT_ACCOUNTS.map(a=>{
      if(a.id==='wonjang'&&d.wonjang) return {...a, pw:d.wonjang.pw||a.pw};
      if(a.id==='jesu1'&&d.jesu1) return {...a, label:d.jesu1.label||a.label, pw:d.jesu1.pw||a.pw};
      if(a.id==='jesu2'&&d.jesu2) return {...a, label:d.jesu2.label||a.label, pw:d.jesu2.pw||a.pw};
      if(a.id==='guest1'&&d.guest1) return {...a, label:d.guest1.label||a.label, pw:d.guest1.pw||a.pw};
      if(a.id==='guest2'&&d.guest2) return {...a, label:d.guest2.label||a.label, pw:d.guest2.pw||a.pw};
      return a;
    });
    // 로그인 화면이면 버튼 이름 갱신
    if(!me) showLogin();
    else if(document.querySelector('.sidebar')) renderApp();
  });
  const saved=localStorage.getItem('hangang_me');
  if(saved&&acct(saved)){me=saved;setMeBadge(acct(saved).label);unread={};registerPresence();initUnreadThenRender();}
  else showLogin();
})();
</script>
