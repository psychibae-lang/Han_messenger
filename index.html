<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전화번호 변경</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

  :root {
    --green: #22c55e;
    --green-dark: #16a34a;
    --green-light: #dcfce7;
    --green-mid: #86efac;
    --bg: #f0fdf4;
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --red-light: #fee2e2;
    --blue-light: #eff6ff;
    --shadow-lg: 0 8px 32px rgba(34,197,94,0.15), 0 4px 12px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; top: -120px; left: -120px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(134,239,172,0.35) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; bottom: -100px; right: -100px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(34,197,94,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 440px;
    overflow: hidden;
    position: relative; z-index: 1;
  }

  /* 헤더 */
  .header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
    padding: 24px 28px 22px;
    position: relative; overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; top: -30px; right: -30px;
    width: 130px; height: 130px;
    background: rgba(255,255,255,0.08); border-radius: 50%;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; font-size: 20px;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .header p { font-size: 12.5px; color: rgba(255,255,255,0.75); line-height: 1.5; }

  /* 스텝 바 */
  .steps {
    display: flex; align-items: center;
    padding: 14px 28px;
    border-bottom: 1px solid var(--gray-100);
    background: var(--gray-50);
  }
  .step { display: flex; align-items: center; gap: 6px; flex: 1; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; transition: all 0.3s;
  }
  .step-label { font-size: 12px; font-weight: 600; transition: color 0.3s; white-space: nowrap; }
  .step.inactive .step-num { background: var(--gray-200); color: var(--gray-400); }
  .step.inactive .step-label { color: var(--gray-400); }
  .step.active .step-num { background: var(--green); color: #fff; }
  .step.active .step-label { color: var(--gray-800); }
  .step.done .step-num { background: var(--green-light); color: var(--green-dark); }
  .step.done .step-label { color: var(--green-dark); }
  .step-line {
    flex: 0 0 28px; height: 1.5px; background: var(--gray-200);
    margin: 0 4px; transition: background 0.3s;
  }
  .step-line.done { background: var(--green); }

  /* 패널 */
  .panel { padding: 24px 28px 28px; display: none; animation: slideIn 0.3s ease; }
  .panel.active { display: block; }
  .success-screen { padding: 20px 28px 32px; display: none; text-align: center; animation: slideIn 0.3s ease; }
  .success-screen.active { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 공통 필드 */
  .field { margin-bottom: 18px; }
  .field label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; font-weight: 600; color: var(--gray-600); margin-bottom: 7px;
  }
  .field label .dot {
    width: 5px; height: 5px; background: var(--green); border-radius: 50%; flex-shrink: 0;
  }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600; color: var(--gray-800);
    background: var(--gray-50); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none; letter-spacing: 0.3px;
  }
  .input-wrap input::placeholder { color: var(--gray-400); font-weight: 400; letter-spacing: 0; }
  .input-wrap input:focus {
    border-color: var(--green); background: var(--white);
    box-shadow: 0 0 0 3px rgba(34,197,94,0.12);
  }
  .input-wrap .icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%); font-size: 16px; pointer-events: none; opacity: 0.45;
  }

  /* 현재 전화번호 박스 */
  .current-box {
    background: var(--blue-light); border: 1.5px solid #bfdbfe;
    border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 18px;
  }
  .cb-label { font-size: 11px; color: #3b82f6; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; }
  .cb-chart { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; }
  .cb-chart strong { color: var(--gray-800); font-weight: 700; }
  .cb-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 5px 0;
    border-top: 1px solid rgba(59,130,246,0.12);
  }
  .cb-row:first-of-type { border-top: none; }
  .cb-src {
    font-size: 11px; color: var(--gray-500);
    background: rgba(59,130,246,0.1); padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  }
  .cb-num { font-size: 16px; font-weight: 700; color: #1e40af; letter-spacing: 0.5px; }

  /* 화살표 */
  .arrow-row {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 4px 0 16px; color: var(--gray-400); font-size: 12px; font-weight: 500;
  }

  /* 버튼 */
  .btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
    cursor: pointer; letter-spacing: 0.3px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 4px 14px rgba(34,197,94,0.3);
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transition: left 0.4s;
  }
  .btn:hover::before { left: 100%; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(34,197,94,0.38); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .btn.gray {
    background: var(--gray-100); color: var(--gray-600);
    box-shadow: none; margin-top: 10px;
  }
  .btn.gray:hover { background: var(--gray-200); box-shadow: none; transform: none; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 메시지 */
  .msg {
    display: none; align-items: flex-start; gap: 9px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    font-size: 13.5px; font-weight: 600; margin-bottom: 16px;
    animation: fadeIn 0.25s ease; line-height: 1.5;
  }
  .msg.show { display: flex; }
  .msg.error { background: var(--red-light); color: #b91c1c; border: 1px solid #fca5a5; }
  .msg-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* 성공 */
  .success-icon {
    width: 64px; height: 64px; background: var(--green-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
  }
  .success-screen h2 { font-size: 18px; font-weight: 700; color: var(--gray-800); margin-bottom: 8px; }
  .success-screen p { font-size: 13px; color: var(--gray-500); line-height: 1.7; margin-bottom: 20px; }
  .success-detail {
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm); padding: 14px 16px; text-align: left;
    margin-bottom: 20px; font-size: 13px; color: var(--gray-600); line-height: 1.9;
  }
  .success-detail strong { color: var(--gray-800); font-weight: 700; }

  @media (max-width: 480px) {
    .header { padding: 20px 22px 18px; }
    .panel, .success-screen { padding: 20px 22px 24px; }
    .steps { padding: 12px 22px; }
  }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="header-icon">📱</div>
    <h1>전화번호 변경</h1>
    <p>차트번호로 현재 전화번호를 확인하고<br>새 번호로 업데이트합니다.</p>
  </div>

  <div class="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <div class="step-label">차트 조회</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step inactive" id="step2">
      <div class="step-num">2</div>
      <div class="step-label">번호 변경</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step inactive" id="step3">
      <div class="step-num">✓</div>
      <div class="step-label">완료</div>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="panel active" id="panel1">
    <div class="field">
      <label><span class="dot"></span>차트번호</label>
      <div class="input-wrap">
        <input type="text" id="chart-input" placeholder="차트번호를 입력하세요"
          inputmode="numeric" autocomplete="off" spellcheck="false">
        <span class="icon">📋</span>
      </div>
    </div>
    <div class="msg error" id="s1-err">
      <span class="msg-icon">⚠️</span>
      <div id="s1-err-msg"></div>
    </div>
    <button class="btn" id="search-btn" onclick="searchChart()">현재 전화번호 조회</button>
  </div>

  <!-- STEP 2 -->
  <div class="panel" id="panel2">
    <div class="current-box" id="current-box">
      <div class="cb-label">📋 현재 등록된 전화번호</div>
      <div class="cb-chart">차트번호 <strong id="display-chart"></strong></div>
      <div id="current-phones"></div>
    </div>

    <div class="arrow-row">↓&nbsp; 아래에 새 번호를 입력하세요</div>

    <div class="field">
      <label><span class="dot"></span>새 전화번호</label>
      <div class="input-wrap">
        <input type="tel" id="phone-new" placeholder="01012345678"
          inputmode="numeric" autocomplete="off" spellcheck="false">
        <span class="icon">📞</span>
      </div>
    </div>

    <div class="msg error" id="s2-err">
      <span class="msg-icon">⚠️</span>
      <div id="s2-err-msg"></div>
    </div>

    <button class="btn" id="change-btn" onclick="changePhone()">전화번호 변경하기</button>
    <button class="btn gray" onclick="goBack()">← 차트번호 다시 입력</button>
  </div>

  <!-- STEP 3 완료 -->
  <div class="success-screen" id="panel3">
    <div class="success-icon">✅</div>
    <h2>변경 완료!</h2>
    <p>전화번호가 성공적으로 변경되었습니다.</p>
    <div class="success-detail" id="success-detail"></div>
    <button class="btn" onclick="resetApp()">다른 차트 변경하기</button>
  </div>

</div>
<script>
  const SUPA_URL  = 'https://rurbfcocihvapbtdzbyt.supabase.co';
  const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1cmJmY29jaWh2YXBidGR6Ynl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTUzMzQsImV4cCI6MjA5MjUzMTMzNH0.Y89bwZlS5ciqfhF9IRbF8oGa9CmFRsP6msFbp7DVypc';

  const H = { 'apikey': SUPA_ANON, 'Authorization': `Bearer ${SUPA_ANON}` };
  const HJ = { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

  let found = { cjIds: [], drIds: [], chart: '' };

  document.getElementById('chart-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchChart(); });
  document.getElementById('phone-new').addEventListener('keydown', e => { if (e.key === 'Enter') changePhone(); });

  function fmt(p) {
    if (!p) return '(없음)';
    const d = p.replace(/[^0-9]/g, '');
    if (d.length === 11) return d.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
    if (d.length === 10) return d.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
    return p;
  }

  function setSteps(n) {
    [1,2,3].forEach(i => {
      document.getElementById('step'+i).className = 'step ' + (i < n ? 'done' : i === n ? 'active' : 'inactive');
    });
    [1,2].forEach(i => {
      document.getElementById('line'+i).className = 'step-line' + (i < n ? ' done' : '');
    });
  }

  function showPanel(n) {
    setSteps(n);
    document.getElementById('panel1').className = n === 1 ? 'panel active' : 'panel';
    document.getElementById('panel2').className = n === 2 ? 'panel active' : 'panel';
    document.getElementById('panel3').className = n === 3 ? 'success-screen active' : 'success-screen';
  }

  function showErr(id, msgId, txt) {
    document.getElementById(id).className = 'msg error show';
    document.getElementById(msgId).textContent = txt;
  }
  function hideErr(id) { document.getElementById(id).className = 'msg error'; }

  async function searchChart() {
    const chart = document.getElementById('chart-input').value.trim();
    hideErr('s1-err');
    if (!chart) { showErr('s1-err','s1-err-msg','차트번호를 입력해 주세요.'); return; }

    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>조회 중...';

    let cjData = [], drData = [];
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/chojin?chart=eq.${encodeURIComponent(chart)}&select=id,phone`, { headers: H });
      const d = await r.json();
      if (Array.isArray(d)) cjData = d;
    } catch(e) { console.error('chojin fetch error:', e); }

    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/daeri?chart=eq.${encodeURIComponent(chart)}&select=id,visitor_phone`, { headers: H });
      const d = await r.json();
      if (Array.isArray(d)) drData = d;
    } catch(e) { console.error('daeri fetch error:', e); }

    btn.disabled = false;
    btn.innerHTML = '현재 전화번호 조회';

    if (cjData.length === 0 && drData.length === 0) {
      showErr('s1-err','s1-err-msg',`차트번호 "${chart}"를 찾을 수 없습니다.`);
      return;
    }

    found = {
      cjIds: cjData.map(r => r.id),
      drIds: drData.map(r => r.id),
      chart
    };

    document.getElementById('display-chart').textContent = chart;
    let html = '';
    if (cjData.length > 0) {
      const phones = [...new Set(cjData.map(r => r.phone).filter(Boolean))];
      html += `<div class="cb-row">
        <span class="cb-src">초진접수 ${cjData.length}건</span>
        <span class="cb-num">${fmt(phones[0] || '')}</span>
      </div>`;
    }
    if (drData.length > 0) {
      const phones = [...new Set(drData.map(r => r.visitor_phone).filter(Boolean))];
      html += `<div class="cb-row">
        <span class="cb-src">대리접수 ${drData.length}건</span>
        <span class="cb-num">${fmt(phones[0] || '')}</span>
      </div>`;
    }
    document.getElementById('current-phones').innerHTML = html;
    document.getElementById('phone-new').value = '';
    hideErr('s2-err');
    showPanel(2);
    setTimeout(() => document.getElementById('phone-new').focus(), 300);
  }

  async function changePhone() {
    const phone = document.getElementById('phone-new').value.trim();
    const clean = phone.replace(/[^0-9]/g, '');
    hideErr('s2-err');

    if (!phone) { showErr('s2-err','s2-err-msg','새 전화번호를 입력해 주세요.'); return; }
    if (clean.length < 9 || clean.length > 11) {
      showErr('s2-err','s2-err-msg','전화번호 형식이 올바르지 않습니다. (9~11자리 숫자)'); return;
    }

    const btn = document.getElementById('change-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>변경 중...';

    let updated = 0;
    const details = [];

    if (found.cjIds.length > 0) {
      try {
        const r = await fetch(
          `${SUPA_URL}/rest/v1/chojin?chart=eq.${encodeURIComponent(found.chart)}`,
          { method: 'PATCH', headers: HJ, body: JSON.stringify({ phone: clean }) }
        );
        if (r.ok) { updated += found.cjIds.length; details.push(`초진접수 ${found.cjIds.length}건`); }
        else { console.error('chojin PATCH failed', r.status, await r.text()); }
      } catch(e) { console.error(e); }
    }

    if (found.drIds.length > 0) {
      try {
        const r = await fetch(
          `${SUPA_URL}/rest/v1/daeri?chart=eq.${encodeURIComponent(found.chart)}`,
          { method: 'PATCH', headers: HJ, body: JSON.stringify({ visitor_phone: clean }) }
        );
        if (r.ok) { updated += found.drIds.length; details.push(`대리접수 ${found.drIds.length}건`); }
        else { console.error('daeri PATCH failed', r.status, await r.text()); }
      } catch(e) { console.error(e); }
    }

    btn.disabled = false;
    btn.innerHTML = '전화번호 변경하기';

    if (updated > 0) {
      document.getElementById('success-detail').innerHTML =
        `<strong>차트번호</strong>　${found.chart}<br>`
        + `<strong>변경된 번호</strong>　${fmt(clean)}<br>`
        + `<strong>변경 건수</strong>　${details.join(', ')} · 총 ${updated}건`;
      showPanel(3);
    } else {
      showErr('s2-err','s2-err-msg','변경 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
    }
  }

  function goBack() {
    hideErr('s1-err');
    showPanel(1);
    setTimeout(() => document.getElementById('chart-input').focus(), 100);
  }

  function resetApp() {
    document.getElementById('chart-input').value = '';
    document.getElementById('phone-new').value = '';
    hideErr('s1-err'); hideErr('s2-err');
    found = { cjIds: [], drIds: [], chart: '' };
    showPanel(1);
    setTimeout(() => document.getElementById('chart-input').focus(), 100);
  }
</script>
</body>
</html>
